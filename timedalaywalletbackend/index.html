<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time-Delay Wallet</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .logo h1   { color: #fff; font-size: 26px; font-weight: 700; letter-spacing: 0.5px; }
    .logo p    { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 6px; }

    /* ── Network Dropdown ── */
    .network-selector {
      position: relative;
      margin-bottom: 20px;
    }

    .network-btn {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border 0.2s, background 0.2s;
      gap: 10px;
    }

    .network-btn:hover { border-color: rgba(108,99,255,0.6); background: rgba(255,255,255,0.1); }

    .network-btn-left { display: flex; align-items: center; gap: 10px; }

    .network-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .network-arrow {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      transition: transform 0.2s;
    }
    .network-arrow.open { transform: rotate(180deg); }

    .network-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1e1b3a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .network-dropdown.open { display: block; }

    .network-option {
      padding: 13px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s;
    }

    .network-option:hover { background: rgba(255,255,255,0.08); }
    .network-option.active { background: rgba(108,99,255,0.2); color: #fff; }

    /* ── Wallet status badge ── */
    .wallet-status {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      min-height: 50px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.connected { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

    .wallet-status span { color: rgba(255,255,255,0.6); font-size: 13px; word-break: break-all; }

    /* ── Input ── */
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 8px; letter-spacing: 0.3px; }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .input-group input::placeholder { color: rgba(255,255,255,0.3); }
    .input-group input:focus { border-color: rgba(108,99,255,0.8); background: rgba(255,255,255,0.1); }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-connect { background: linear-gradient(135deg, #6c63ff, #4facfe); color: #fff; }
    .btn-connect:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.4); }

    .btn-create { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a1a; }
    .btn-create:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,210,0,0.4); }

    /* ── Status box ── */
    .status-box {
      border-radius: 12px; padding: 14px 16px;
      font-size: 13px; margin-top: 16px;
      display: none; line-height: 1.6; word-break: break-all;
    }
    .status-box.info    { background: rgba(79,172,254,0.15); border: 1px solid rgba(79,172,254,0.3);  color: #7ecfff; }
    .status-box.success { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.3);  color: #2ecc71; }
    .status-box.error   { background: rgba(231,76,60,0.15);  border: 1px solid rgba(231,76,60,0.3);   color: #ff6b6b; }
    .status-box.loading { background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);  color: #a29bfe; }

    /* ── Wallet result card ── */
    .wallet-result {
      background: rgba(46,204,113,0.08);
      border: 1px solid rgba(46,204,113,0.2);
      border-radius: 14px; padding: 20px;
      margin-top: 20px; display: none;
    }
    .wallet-result h3 { color: #2ecc71; font-size: 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    .result-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .result-row:last-child { margin-bottom: 0; }
    .result-label { color: rgba(255,255,255,0.4); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
    .result-value { color: #fff; font-size: 13px; word-break: break-all; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px; font-family: monospace; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 24px 0; }
    .step-label { color: rgba(255,255,255,0.25); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <span class="logo-icon">⏱️</span>
    <h1>Time-Delay Wallet</h1>
    <p>Secure. Delayed. On-Chain.</p>
  </div>

  <!-- Network Selector -->
  <div class="step-label">Select Network</div>
  <div class="network-selector" id="networkSelector">
    <button class="network-btn" onclick="toggleDropdown()" id="networkBtn">
      <div class="network-btn-left">
        <div class="network-dot" id="networkDot" style="background:#627EEA;"></div>
        <span id="networkLabel">ETH Sepolia</span>
      </div>
      <span class="network-arrow" id="networkArrow">▼</span>
    </button>
    <div class="network-dropdown" id="networkDropdown">
      <div class="network-option active" onclick="selectNetwork('sepolia')" id="opt-sepolia">
        <div class="network-dot" style="background:#627EEA;"></div>
        ETH Sepolia
      </div>
      <div class="network-option" onclick="selectNetwork('xhavic')" id="opt-xhavic">
        <div class="network-dot" style="background:#00C9A7;"></div>
        XHAVIC
      </div>
    </div>
  </div>

  <hr class="divider" style="margin-top:8px;"/>

  <!-- Wallet Status -->
  <div class="wallet-status">
    <div class="dot" id="dot"></div>
    <span id="walletStatusText">Not connected</span>
  </div>

  <!-- Step 1: Connect -->
  <div class="step-label">Step 1</div>
  <button class="btn btn-connect" id="connectBtn" onclick="connectWallet()">
    🦊 Connect Wallet
  </button>

  <hr class="divider"/>

  <!-- Step 2: Email + Create -->
  <div class="step-label">Step 2</div>

  <div class="input-group">
    <label>Email Address</label>
    <input type="email" id="emailInput" placeholder="you@gmail.com" disabled />
  </div>

  <button class="btn btn-create" id="createBtn" onclick="createWallet()" disabled>
    🚀 Create TD Wallet
  </button>

  <!-- Status Messages -->
  <div class="status-box" id="statusBox"></div>

  <!-- Wallet Result -->
  <div class="wallet-result" id="walletResult">
    <h3>✅ Wallet Created Successfully</h3>
    <div class="result-row">
      <span class="result-label">Network</span>
      <span class="result-value" id="resultNetwork">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">Your TD Wallet Address</span>
      <span class="result-value" id="resultWallet">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">Owner (Your EOA)</span>
      <span class="result-value" id="resultOwner">—</span>
    </div>
    <div class="result-row">
      <span class="result-label">Email Registered</span>
      <span class="result-value" id="resultEmail">—</span>
    </div>
  </div>

</div>

<script>
  // ── Network Config ───────────────────────────────────────────────────
  const NETWORKS = {
    sepolia: {
      label:          "ETH Sepolia",
      chainId:        11155111,
      chainIdHex:     "0xaa36a7",
      color:          "#627EEA",
      symbol:         "ETH",
      rpcUrl:         "https://rpc.sepolia.org",
      factoryAddress: "0xFE6327aeCAeF8Ddb3E0CA8AEc61FBDCFE735A1CA",
      blockExplorer:  "https://sepolia.etherscan.io",
    },
    xhavic: {
      label:          "XHAVIC",
      chainId:        16585,
      chainIdHex:     "0x40C9",
      color:          "#00C9A7",
      symbol:         "XVC",
      rpcUrl:         "https://testrpc.xhaviscan.com",
      factoryAddress: "0xa02D10E5Be73003Fb8191F22c61C5Ec1BAe6e424",
      blockExplorer:  "https://xhaviscan.com",
    },
  };

  const FACTORY_ABI = [
    "function createWallet() external returns (address)",
    "event WalletCreated(address indexed wallet, address indexed owner)"
  ];

  const BACKEND_URL = "http://localhost:3000";

  let selectedNetwork = "sepolia";
  let signer    = null;
  let userEOA   = null;
  let connected = false;

  // ── Dropdown ─────────────────────────────────────────────────────────
  function toggleDropdown() {
    const dd    = document.getElementById("networkDropdown");
    const arrow = document.getElementById("networkArrow");
    const open  = dd.classList.toggle("open");
    arrow.classList.toggle("open", open);
  }

  document.addEventListener("click", (e) => {
    if (!document.getElementById("networkSelector").contains(e.target)) {
      document.getElementById("networkDropdown").classList.remove("open");
      document.getElementById("networkArrow").classList.remove("open");
    }
  });

  function selectNetwork(key) {
    const net = NETWORKS[key];
    selectedNetwork = key;

    // Update button display
    document.getElementById("networkLabel").textContent = net.label;
    document.getElementById("networkDot").style.background = net.color;

    // Update active state
    document.querySelectorAll(".network-option").forEach(el => el.classList.remove("active"));
    document.getElementById("opt-" + key).classList.add("active");

    // Close dropdown
    document.getElementById("networkDropdown").classList.remove("open");
    document.getElementById("networkArrow").classList.remove("open");

    // Reset connection state when network changes
    resetConnection();
  }

  function resetConnection() {
    connected = false;
    signer = null;
    userEOA = null;
    document.getElementById("dot").classList.remove("connected");
    document.getElementById("walletStatusText").textContent = "Not connected";
    const connectBtn = document.getElementById("connectBtn");
    connectBtn.disabled = false;
    connectBtn.innerHTML = "🦊 Connect Wallet";
    connectBtn.style.background = "";
    document.getElementById("emailInput").disabled = true;
    document.getElementById("createBtn").disabled  = true;
    document.getElementById("walletResult").style.display = "none";
    hideStatus();
  }

  // ── Status helpers ───────────────────────────────────────────────────
  function showStatus(msg, type) {
    const box = document.getElementById("statusBox");
    box.className = `status-box ${type}`;
    box.innerHTML = msg;
    box.style.display = "block";
  }

  function hideStatus() {
    document.getElementById("statusBox").style.display = "none";
  }

  // ── Connect Wallet ───────────────────────────────────────────────────
  async function connectWallet() {
    if (!window.ethereum) {
      showStatus("❌ MetaMask not found. Please install MetaMask.", "error");
      return;
    }

    const btn = document.getElementById("connectBtn");
    const net = NETWORKS[selectedNetwork];

    try {
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Connecting...`;

      await window.ethereum.request({ method: "eth_requestAccounts" });

      const provider = new ethers.BrowserProvider(window.ethereum);
      const network  = await provider.getNetwork();

      // Auto switch network if wrong chain
      if (Number(network.chainId) !== net.chainId) {
        showStatus(`⏳ Switching to <strong>${net.label}</strong>...`, "loading");
        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: net.chainIdHex }],
          });
        } catch (switchErr) {
          // Chain not added to MetaMask — add it
          if (switchErr.code === 4902) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId:           net.chainIdHex,
                chainName:         net.label,
                nativeCurrency:    { name: net.symbol, symbol: net.symbol, decimals: 18 },
                rpcUrls:           [net.rpcUrl],
                blockExplorerUrls: [net.blockExplorer],
              }],
            });
          } else {
            throw switchErr;
          }
        }
      }

      // Re-init provider after switch
      const newProvider = new ethers.BrowserProvider(window.ethereum);
      signer  = await newProvider.getSigner();
      userEOA = await signer.getAddress();

      document.getElementById("dot").classList.add("connected");
      document.getElementById("walletStatusText").textContent = userEOA;
      btn.innerHTML = "✅ Connected";
      btn.style.background = "linear-gradient(135deg,#2ecc71,#27ae60)";

      document.getElementById("emailInput").disabled = false;
      document.getElementById("createBtn").disabled  = false;

      connected = true;
      hideStatus();

    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = "🦊 Connect Wallet";
      showStatus(`❌ ${err.message}`, "error");
    }
  }

  // ── Create TD Wallet ─────────────────────────────────────────────────
  async function createWallet() {
    if (!connected) {
      showStatus("❌ Please connect your wallet first.", "error");
      return;
    }

    const email = document.getElementById("emailInput").value.trim();
    if (!email || !email.includes("@")) {
      showStatus("❌ Please enter a valid email address.", "error");
      return;
    }

    const net       = NETWORKS[selectedNetwork];
    const createBtn = document.getElementById("createBtn");

    try {
      createBtn.disabled = true;
      createBtn.innerHTML = `<span class="spinner"></span> Creating Wallet...`;
      showStatus("⏳ Sending transaction to blockchain...", "loading");

      const factory = new ethers.Contract(net.factoryAddress, FACTORY_ABI, signer);
      const tx      = await factory.createWallet();

      showStatus("⏳ Waiting for confirmation...", "loading");
      const receipt = await tx.wait();

      // Extract wallet address from WalletCreated event
      let walletAddress = null;
      for (const log of receipt.logs) {
        try {
          const parsed = factory.interface.parseLog(log);
          if (parsed && parsed.name === "WalletCreated") {
            walletAddress = parsed.args.wallet;
            break;
          }
        } catch (_) {}
      }

      if (!walletAddress) throw new Error("Wallet address not found in transaction logs");

      showStatus("⏳ Registering wallet + email with backend...", "loading");

      const response = await fetch(`${BACKEND_URL}/api/wallet/register`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ walletAddress, ownerAddress: userEOA, email }),
      });

      const result = await response.json();
      if (!result.success) throw new Error(result.message || "Backend registration failed");

      hideStatus();
      document.getElementById("resultNetwork").textContent = net.label + " (" + net.symbol + ")";
      document.getElementById("resultWallet").textContent  = walletAddress;
      document.getElementById("resultOwner").textContent   = userEOA;
      document.getElementById("resultEmail").textContent   = email;
      document.getElementById("walletResult").style.display = "block";

      createBtn.innerHTML = "✅ Wallet Created";
      createBtn.style.background = "linear-gradient(135deg,#2ecc71,#27ae60)";
      createBtn.style.color = "#fff";

    } catch (err) {
      createBtn.disabled = false;
      createBtn.innerHTML = "🚀 Create TD Wallet";
      if (err.code === "ACTION_REJECTED") {
        showStatus("❌ Transaction rejected by user.", "error");
      } else {
        showStatus(`❌ ${err.message}`, "error");
      }
    }
  }
</script>

</body>
</html>
